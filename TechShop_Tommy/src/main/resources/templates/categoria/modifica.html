<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}">
        <title>TechShop</title>
    </head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <section class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">

                    <div class="card">

                        <div class="card-header bg-success text-white">
                            <h4>[[#{accion.actualizar}]]</h4>
                        </div>

                        <form th:action="@{/categoria/guardar}"
                              th:object="${categoria}"
                              method="post"
                              enctype="multipart/form-data"
                              class="was-validated">

                            <div class="card-body">

                                <input type="hidden"
                                       th:field="*{idCategoria}"/>

                                <input type="hidden"
                                       th:field="*{rutaImagen}"/>

                                <div class="mb-3">
                                    <label for="descripcion">
                                        [[#{categoria.descripcion}]]
                                    </label>

                                    <input type="text"
                                           id="descripcion"
                                           class="form-control"
                                           th:field="*{descripcion}"
                                           required="true"/>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox"
                                           id="activo"
                                           class="form-check-input"
                                           th:field="*{activo}"/>

                                    <label class="form-check-label"
                                           for="activo">
                                        [[#{categoria.activo}]]
                                    </label>
                                </div>

                                <div class="mb-3">
                                    <label for="imagenFile">
                                        [[#{categoria.imagen}]]
                                    </label>

                                    <input type="file"
                                           id="imagenFile"
                                           class="form-control"
                                           name="imagenFile"
                                           accept="image/*"/>

                                    <div class="mt-3"
                                         th:if="${categoria.rutaImagen != null and !categoria.rutaImagen.isBlank()}">

                                        <p>Imagen actual:</p>

                                        <img th:src="${categoria.rutaImagen}"
                                             alt="Imagen actual"
                                             height="120"/>
                                    </div>
                                </div>

                            </div>

                            <div class="card-footer text-end">

                                <a th:href="@{/categoria/listado}"
                                   class="btn btn-secondary">
                                    [[#{accion.regresar}]]
                                </a>

                                <button type="submit"
                                        class="btn btn-success">
                                    [[#{accion.guardar}]]
                                </button>

                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </section>

        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
