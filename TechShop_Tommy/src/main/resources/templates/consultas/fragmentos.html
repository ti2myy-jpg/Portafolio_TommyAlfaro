<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <body>

        <section th:fragment="consultas"
                 class="container mt-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <section th:replace="~{consultas/fragmentos :: formConsulta('primary','consultas.derivadas','/consultas/consultaDerivada')}"></section>
                </div>

                <div class="col-md-4">
                    <section th:replace="~{consultas/fragmentos :: formConsulta('success','consultas.jpql','/consultas/consultaJPQL')}"></section>
                </div>

                <div class="col-md-4">
                    <section th:replace="~{consultas/fragmentos :: formConsulta('info','consultas.sql','/consultas/consultaSQL')}"></section>
                </div>
            </div>
        </section>

        <section th:fragment="formConsulta(colorForm, textoForm, urlForm)">
            <form th:action="${urlForm}"
                  method="post"
                  class="card h-100">
                <div class="card-header text-white"
                     th:classappend="'bg-' + ${colorForm}">
                    [[#{__${textoForm}__}]]
                </div>

                <div class="card-body">
                    <div class="mb-3">
                        <label th:for="|precioInf${colorForm}|"
                               class="form-label">
                            [[#{consultas.precio.inferior}]]
                        </label>
                        <input type="number"
                               th:id="|precioInf${colorForm}|"
                               name="precioInf"
                               class="form-control"
                               step="0.01"
                               min="0"
                               th:value="${precioInf}"
                               required="true"/>
                    </div>

                    <div class="mb-3">
                        <label th:for="|precioSup${colorForm}|"
                               class="form-label">
                            [[#{consultas.precio.superior}]]
                        </label>
                        <input type="number"
                               th:id="|precioSup${colorForm}|"
                               name="precioSup"
                               class="form-control"
                               step="0.01"
                               min="0"
                               th:value="${precioSup}"
                               required="true"/>
                    </div>

                    <button type="submit"
                            class="btn w-100"
                            th:classappend="'btn-' + ${colorForm}">
                        <i class="fas fa-search"></i>
                        [[#{accion.buscar}]]
                    </button>
                </div>
            </form>
        </section>

        <section th:fragment="tabs"
                 class="container mt-4">
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${idCategoria == null} ? 'active'"
                       th:href="@{/}">
                        [[#{pruebas.todas}]]
                    </a>
                </li>

                <li class="nav-item"
                    th:each="categoria : ${categorias}">
                    <a class="nav-link"
                       th:classappend="${idCategoria != null and idCategoria == categoria.idCategoria} ? 'active'"
                       th:href="@{/categoria/{idCategoria}(idCategoria=${categoria.idCategoria})}">
                        [[${categoria.descripcion}]]
                    </a>
                </li>
            </ul>
        </section>

        <section th:fragment="tarjetas"
                 class="container mt-4">
            <div class="row row-cols-1 row-cols-md-3 g-4"
                 th:if="${productos != null and !productos.empty}">

                <div class="col"
                     th:each="producto : ${productos}">
                    <div class="card h-100">
                        <img th:if="${producto.rutaImagen != null and !producto.rutaImagen.isBlank()}"
                             th:src="${producto.rutaImagen}"
                             class="card-img-top"
                             alt="Imagen de producto"
                             style="height: 200px; object-fit: contain;"/>

                        <div class="card-body">
                            <h5 class="card-title">
                                [[${producto.descripcion}]]
                            </h5>

                            <p class="card-text">
                                [[${producto.detalle}]]
                            </p>
                        </div>

                        <div class="card-footer text-center">
                            <span class="h5">
                                [[${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}]]
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center p-4"
                 th:if="${productos == null or productos.empty}">
                <span>[[#{lista.vacia}]]</span>
            </div>
        </section>

    </body>
</html>
