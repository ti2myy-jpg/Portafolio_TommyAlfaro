<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}">
        <title>TechShop</title>
    </head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <section class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8">

                    <div class="card">

                        <div class="card-header bg-success text-white">
                            <h4>[[#{accion.actualizar}]]</h4>
                        </div>

                        <form th:action="@{/producto/guardar}"
                              th:object="${producto}"
                              method="post"
                              enctype="multipart/form-data"
                              class="was-validated">

                            <div class="card-body">

                                <input type="hidden"
                                       th:field="*{idProducto}"/>

                                <input type="hidden"
                                       th:field="*{rutaImagen}"/>

                                <div class="mb-3">
                                    <label for="descripcion">
                                        [[#{producto.descripcion}]]
                                    </label>

                                    <input type="text"
                                           id="descripcion"
                                           class="form-control"
                                           th:field="*{descripcion}"
                                           maxlength="50"
                                           required="true"/>
                                </div>

                                <div class="mb-3">
                                    <label for="detalle">
                                        [[#{producto.detalle}]]
                                    </label>

                                    <textarea id="detalle"
                                              class="form-control"
                                              th:field="*{detalle}"
                                              rows="3"></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="precio">
                                            [[#{producto.precio}]]
                                        </label>

                                        <input type="number"
                                               id="precio"
                                               class="form-control"
                                               th:field="*{precio}"
                                               step="0.01"
                                               min="0.01"
                                               required="true"/>
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="existencias">
                                            [[#{producto.existencias}]]
                                        </label>

                                        <input type="number"
                                               id="existencias"
                                               class="form-control"
                                               th:field="*{existencias}"
                                               min="0"
                                               required="true"/>
                                    </div>

                                    <div class="col-md-4 mb-3">
                                        <label for="idCategoria">
                                            [[#{producto.categoria}]]
                                        </label>

                                        <select id="idCategoria"
                                                class="form-select"
                                                th:field="*{categoria.idCategoria}"
                                                required="true">
                                            <option value="">Seleccione...</option>
                                            <option th:each="categoria : ${categorias}"
                                                    th:value="${categoria.idCategoria}"
                                                    th:text="${categoria.descripcion}">
                                            </option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox"
                                           id="activo"
                                           class="form-check-input"
                                           th:field="*{activo}"/>

                                    <label class="form-check-label"
                                           for="activo">
                                        [[#{producto.activo}]]
                                    </label>
                                </div>

                                <div class="mb-3">
                                    <label for="imagenFile">
                                        [[#{producto.imagen}]]
                                    </label>

                                    <input type="file"
                                           id="imagenFile"
                                           class="form-control"
                                           name="imagenFile"
                                           accept="image/*"/>

                                    <div class="mt-3"
                                         th:if="${producto.rutaImagen != null and !producto.rutaImagen.isBlank()}">

                                        <p>Imagen actual:</p>

                                        <img th:src="${producto.rutaImagen}"
                                             alt="Imagen actual"
                                             height="120"/>
                                    </div>
                                </div>

                            </div>

                            <div class="card-footer text-end">

                                <a th:href="@{/producto/listado}"
                                   class="btn btn-secondary">
                                    [[#{accion.regresar}]]
                                </a>

                                <button type="submit"
                                        class="btn btn-success">
                                    [[#{accion.guardar}]]
                                </button>

                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </section>

        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
